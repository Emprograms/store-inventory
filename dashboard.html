<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Inventory Dashboard</h1>
    </header>
    <main>
        <section>
            <h2>Products</h2>
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Stock Level</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Product 1</td>
                        <td>100</td>
                    </tr>
                    <tr>
                        <td>Product 2</td>
                        <td>50</td>
                    </tr>
                    <tr>
                        <td>Product 3</td>
                        <td>75</td>
                    </tr>
                </tbody>
            </table>
        </section>
        <section>
            <h2>Transaction History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2026-03-20</td>
                        <td>Product 1</td>
                        <td>20</td>
                        <td>Sale</td>
                    </tr>
                    <tr>
                        <td>2026-03-21</td>
                        <td>Product 2</td>
                        <td>10</td>
                        <td>Restock</td>
                    </tr>
                    <tr>
                        <td>2026-03-22</td>
                        <td>Product 3</td>
                        <td>5</td>
                        <td>Sale</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Inventory Dashboard</p>
    </footer>
</body>
</html>
